  - ".serena/cache"
  - ".serena/cache/**"
  - ".serena/logs"
  - ".serena/logs/**"
  - ".serena/memories"
  - ".serena/memories/**"
  - "logs/**"
  - "backend/logs/**"
  - "backend/target/**"
  - "frontend/node_modules/**"
  - "frontend/dist/**"
read_only: false
excluded_tools: []
included_optional_tools: []
fixed_tools: []
default_modes: []
added_modes: []
initial_prompt: "Aienie AISocialGame. Read AGENTS.md, doc/README.md, and .codex/codebase/README.md before work. For public service integration, use /home/duwei/aienie-services/aienie-doc/interfaces/{user-service,ai-service,pay-service}/ as the contract source."
symbol_info_budget: 10
read_only_memory_patterns: []
