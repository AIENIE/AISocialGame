syntax = "proto3";

package fireflychat.ai.v1;

option java_multiple_files = true;
option java_package = "fireflychat.ai.v1";
option java_outer_classname = "AiServiceProto";

enum ModelType {
  MODEL_TYPE_UNSPECIFIED = 0;
  MODEL_TYPE_TEXT = 1;
  MODEL_TYPE_IMAGE = 2;
  MODEL_TYPE_EMBEDDING = 3;
  MODEL_TYPE_AUDIO = 4;
}

message ModelOption {
  int64 id = 1;
  string display_name = 2;
  string provider = 3;
  double input_rate = 4;
  double output_rate = 5;
  ModelType type = 6;
  bool supports_image_input = 7;
}

message ListModelsRequest {
  int64 user_id = 1;
}

message ListModelsResponse {
  repeated ModelOption models = 1;
}

message ChatMessage {
  string role = 1;
  string content = 2;
}

message ChatCompletionsRequest {
  // Recommended idempotency / tracing key.
  string request_id = 1;
  string project_key = 2;
  int64 user_id = 3;
  string session_id = 4;

  // Accepts model id (stringified) or model name.
  string model = 5;
  repeated ChatMessage messages = 6;
  string img = 7;
}

message ChatCompletionsResponse {
  string content = 1;
  string model_key = 2;
  int64 prompt_tokens = 3;
  int64 completion_tokens = 4;
}

message EmbeddingsRequest {
  string request_id = 1;
  string project_key = 2;
  int64 user_id = 3;
  string session_id = 4;
  string model = 5;
  repeated string input = 6;
  optional bool normalize = 7;
}

message Embedding {
  repeated float vector = 1;
}

message EmbeddingsResponse {
  string model_key = 1;
  int32 dimensions = 2;
  repeated Embedding embeddings = 3;
  int64 prompt_tokens = 4;
}

message OcrParseRequest {
  string request_id = 1;
  string project_key = 2;
  int64 user_id = 3;
  string session_id = 4;
  string model = 5;
  string image_url = 6;
  string image_base64 = 7;
  string document_url = 8;
  string pages = 9;
  string output_type = 10;
  optional bool flatten = 11;
  optional bool page_details = 12;
}

message OcrParseResponse {
  string request_id = 1;
  string model_key = 2;
  string output_type = 3;
  string content = 4;
  string raw_json = 5;
}

message GenerateImageRequest {
  int64 user_id = 1;
  string model = 2;
  string prompt = 3;
  string quality = 4;
  string reference_image_url = 5;
  string reference_image_base64 = 6;
}

message GenerateImageResponse {
  string image_url = 1;
  int64 prompt_tokens = 2;
  int64 completion_tokens = 3;
  int64 total_tokens = 4;
}

service AiGatewayService {
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc ChatCompletions(ChatCompletionsRequest) returns (ChatCompletionsResponse);
  rpc Embeddings(EmbeddingsRequest) returns (EmbeddingsResponse);
  rpc OcrParse(OcrParseRequest) returns (OcrParseResponse);
  rpc GenerateImage(GenerateImageRequest) returns (GenerateImageResponse);
}
