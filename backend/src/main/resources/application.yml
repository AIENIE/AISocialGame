spring:
  config:
    import: classpath:prompt.yml
  application:
    name: ${SPRING_APPLICATION_NAME:ai-social-game}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://base.seekerhut.com:3306/aisocialgame?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:aisocialgame}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-test-query: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TEST_QUERY:SELECT 1}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:192.168.5.208}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:${BACKEND_PORT:11031}}

logging:
  file:
    name: ${LOGGING_FILE_NAME:${APP_LOG_DIR:./logs}/aisocialgame.log}
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.aisocialgame: ${LOGGING_LEVEL_APP:INFO}

app:
  project-key: ${APP_PROJECT_KEY:aisocialgame}
  sso:
    user-service-base-url: ${SSO_USER_SERVICE_BASE_URL:https://userservice.seekerhut.com}
    callback-url: ${SSO_CALLBACK_URL:https://aisocialgame.localhut.com/sso/callback}
    login-path: ${SSO_LOGIN_PATH:/sso/login}
    register-path: ${SSO_REGISTER_PATH:/register}
  auth:
    token-ttl-hours: ${APP_AUTH_TOKEN_TTL_HOURS:168}
  redis:
    token-key-prefix: ${APP_REDIS_TOKEN_KEY_PREFIX:aisocialgame:auth:token:}
  ai:
    default-model: ${APP_AI_DEFAULT_MODEL:}
    system-user-id: ${APP_AI_SYSTEM_USER_ID:0}
  credit:
    checkin-grant-tokens: ${APP_CREDIT_CHECKIN_GRANT_TOKENS:20}
    temp-expiry-days: ${APP_CREDIT_TEMP_EXPIRY_DAYS:30}
    exchange-daily-limit: ${APP_CREDIT_EXCHANGE_DAILY_LIMIT:2000}
    redeem-failure-limit-per-day: ${APP_CREDIT_REDEEM_FAILURE_LIMIT_PER_DAY:10}
  websocket:
    enabled: ${APP_WEBSOCKET_ENABLED:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:11030,http://127.0.0.1:5173,http://127.0.0.1:4173,http://127.0.0.1:11030,http://localhost,https://localhost,http://aisocialgame.localhut.com,http://aisocialgame.localhut.com:11030,https://aisocialgame.localhut.com,http://aisocialgame.aienie.com,http://aisocialgame.aienie.com:11030,https://aisocialgame.aienie.com}
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:}
    display-name: ${APP_ADMIN_DISPLAY_NAME:系统管理员}
    token-ttl-hours: ${APP_ADMIN_TOKEN_TTL_HOURS:8}
  security:
    allow-weak-runtime-defaults: ${APP_SECURITY_ALLOW_WEAK_RUNTIME_DEFAULTS:false}
    allow-plaintext-grpc: ${APP_SECURITY_ALLOW_PLAINTEXT_GRPC:false}
  demo-seed:
    enabled: ${APP_DEMO_SEED_ENABLED:false}
  external:
    grpc-auth-required: ${APP_EXTERNAL_GRPC_AUTH_REQUIRED:true}
    userservice-internal-grpc-token: ${APP_EXTERNAL_USERSERVICE_INTERNAL_GRPC_TOKEN:}
    payservice-jwt: ${APP_EXTERNAL_PAYSERVICE_JWT:}
    aiservice-hmac-caller: ${APP_EXTERNAL_AISERVICE_HMAC_CALLER:}
    aiservice-hmac-secret: ${APP_EXTERNAL_AISERVICE_HMAC_SECRET:}

qdrant:
  host: ${QDRANT_HOST:http://192.168.5.208}
  http-port: ${QDRANT_PORT:6333}
  enabled: ${QDRANT_ENABLED:true}

connection:
  disconnect-threshold-seconds: ${APP_CONNECTION_DISCONNECT_THRESHOLD_SECONDS:60}

grpc:
  client:
    user:
      address: ${USER_GRPC_ADDR:static://userservice.seekerhut.com:443}
      negotiationType: ${USER_GRPC_NEGOTIATION_TYPE:TLS}
    billing:
      address: ${BILLING_GRPC_ADDR:static://payservice.seekerhut.com:443}
      negotiationType: ${BILLING_GRPC_NEGOTIATION_TYPE:TLS}
    ai:
      address: ${AI_GRPC_ADDR:static://aiservice.seekerhut.com:443}
      negotiationType: ${AI_GRPC_NEGOTIATION_TYPE:TLS}
