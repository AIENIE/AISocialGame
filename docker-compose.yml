services:
  backend:
    image: eclipse-temurin:25-jre
    container_name: aisocial-backend
    ports:
      - "11031:11031"
    working_dir: /app
    command: ["sh", "-c", ". /app/bin/load-env-file.sh; load_one_env_file /app/env.local && exec java $${JAVA_OPTS:-} -jar /app/app.jar"]
    volumes:
      - ./backend/target/ai-social-game-0.0.1-SNAPSHOT.jar:/app/app.jar:ro
      - ./backend/src/main/resources/application.yml:/app/config/application.yml:ro
      - ./backend/src/main/resources/prompt.yml:/app/config/prompt.yml:ro
      - ./env.txt:/app/env.txt:ro
      - ./env.local:/app/env.local:ro
      - ./docker/load-env-file.sh:/app/bin/load-env-file.sh:ro
      - /home/duwei/aienie-runtime/observability/data/aisocialgame/logs:/app/logs
      - /home/duwei/aienie-runtime/observability/data/aisocialgame/records:/app/records

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aisocial-frontend
    depends_on:
      - backend
    ports:
      - "11030:11030"

