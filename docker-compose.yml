services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aisocial-backend
    ports:
      - "11031:20030"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:h2:mem:aisocialgame;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.h2.Driver}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-localdev}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-base.seekerhut.com}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-26379}
      APP_REDIS_TOKEN_KEY_PREFIX: ${APP_REDIS_TOKEN_KEY_PREFIX:-aisocialgame:auth:token:}
      APP_AUTH_TOKEN_TTL_HOURS: 168
      APP_PROJECT_KEY: ${APP_PROJECT_KEY:-aisocialgame}
      APP_AI_SYSTEM_USER_ID: ${APP_AI_SYSTEM_USER_ID:-1}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}
      USER_GRPC_ADDR: ${USER_GRPC_ADDR:-static://userservice.localhut.com:10001}
      BILLING_GRPC_ADDR: ${BILLING_GRPC_ADDR:-static://payservice.localhut.com:10021}
      AI_GRPC_ADDR: ${AI_GRPC_ADDR:-static://aiservice.localhut.com:10011}
      USER_GRPC_NEGOTIATION_TYPE: ${USER_GRPC_NEGOTIATION_TYPE:-PLAINTEXT}
      BILLING_GRPC_NEGOTIATION_TYPE: ${BILLING_GRPC_NEGOTIATION_TYPE:-PLAINTEXT}
      AI_GRPC_NEGOTIATION_TYPE: ${AI_GRPC_NEGOTIATION_TYPE:-PLAINTEXT}
      APP_SECURITY_ALLOW_WEAK_RUNTIME_DEFAULTS: ${APP_SECURITY_ALLOW_WEAK_RUNTIME_DEFAULTS:-false}
      APP_SECURITY_ALLOW_PLAINTEXT_GRPC: ${APP_SECURITY_ALLOW_PLAINTEXT_GRPC:-true}
      SSO_USER_SERVICE_BASE_URL: ${SSO_USER_SERVICE_BASE_URL:-https://userservice.localhut.com}
      QDRANT_HOST: ${QDRANT_HOST:-http://base.seekerhut.com}
      QDRANT_PORT: ${QDRANT_PORT:-26333}
      QDRANT_ENABLED: ${QDRANT_ENABLED:-false}
      APP_EXTERNAL_GRPC_AUTH_REQUIRED: ${APP_EXTERNAL_GRPC_AUTH_REQUIRED:-true}
      APP_EXTERNAL_USERSERVICE_INTERNAL_GRPC_TOKEN: ${APP_EXTERNAL_USERSERVICE_INTERNAL_GRPC_TOKEN:-}
      APP_EXTERNAL_PAYSERVICE_JWT: ${APP_EXTERNAL_PAYSERVICE_JWT:-}
      APP_EXTERNAL_AISERVICE_HMAC_CALLER: ${APP_EXTERNAL_AISERVICE_HMAC_CALLER:-}
      APP_EXTERNAL_AISERVICE_HMAC_SECRET: ${APP_EXTERNAL_AISERVICE_HMAC_SECRET:-}
      SSO_CALLBACK_URL: ${SSO_CALLBACK_URL:-https://aisocialgame.localhut.com/sso/callback}
      SSO_LOGIN_PATH: ${SSO_LOGIN_PATH:-/sso/login}
      SSO_REGISTER_PATH: ${SSO_REGISTER_PATH:-/register}
      SERVER_PORT: ${SERVER_PORT:-20030}
      JAVA_OPTS: ""
      SPRING_CONFIG_ADDITIONAL_LOCATION: optional:/app/config/
    extra_hosts:
      - "userservice.localhut.com:host-gateway"
      - "payservice.localhut.com:host-gateway"
      - "aiservice.localhut.com:host-gateway"
    networks:
      - aisocial

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aisocial-frontend
    depends_on:
      - backend
    ports:
      - "11030:80"
    networks:
      - aisocial

networks:
  aisocial:
    driver: bridge
